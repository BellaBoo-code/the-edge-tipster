<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Edge — Daily Betting Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.12);
  --green: #2ecc71;
  --green-dim: rgba(46,204,113,0.1);
  --red: #e74c3c;
  --red-dim: rgba(231,76,60,0.08);
  --purple: #8b6de8;
  --purple-dim: rgba(139,109,232,0.1);
  --bg: #0a0a0c;
  --bg2: #101013;
  --bg3: #16161a;
  --border: rgba(255,255,255,0.06);
  --border-gold: rgba(201,168,76,0.2);
  --text: #f0ede8;
  --text-dim: #6a6860;
  --text-mid: #a0a09a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes growBar{from{width:0}to{width:var(--w)}}
.fade-up{animation:fadeUp 0.45s ease both;}
 
/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,12,0.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex;align-items:center;
  height:56px;gap:0;
}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:auto;}
.nav-logo-mark{
  width:30px;height:30px;background:var(--gold);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:900;color:#0a0a0c;font-size:0.95rem;
  flex-shrink:0;
}
.nav-logo-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}
.nav-logo-sub{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-dim);letter-spacing:0.15em;margin-top:1px;}
.nav-tabs{display:flex;align-items:center;gap:2px;margin:0 16px;}
.nav-tab{
  padding:6px 12px;border:none;background:transparent;
  color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:0.8rem;
  cursor:pointer;border-radius:6px;transition:all 0.2s;white-space:nowrap;
}
.nav-tab.active{background:var(--gold-dim);color:var(--gold);}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text-mid);}
.nav-status{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:0.6rem;}
.status-dot{width:6px;height:6px;border-radius:50%;}
.dot-live{background:var(--green);animation:pulse 2s infinite;}
.dot-loading{background:var(--gold);animation:pulse 1s infinite;}
.dot-off{background:#333;}
 
/* STATS BAR */
.stats-bar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:12px 20px;gap:8px;
}
@media(max-width:500px){.stats-bar{grid-template-columns:repeat(2,1fr);}}
.stat{text-align:center;}
.stat-val{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--text-dim);letter-spacing:0.1em;margin-top:3px;text-transform:uppercase;}
.green{color:var(--green)!important;}
.gold{color:var(--gold)!important;}
.red{color:var(--red)!important;}
.white{color:var(--text)!important;}
 
/* PAGE */
.page{display:none;max-width:740px;margin:0 auto;padding:20px 14px 60px;}
.page.active{display:block;}
 
/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.sh-line{flex:1;height:1px;background:var(--border);}
.sh-text{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.18em;color:var(--text-dim);white-space:nowrap;text-transform:uppercase;}
 
/* DATE ROW */
.date-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:8px;
}
.date-label{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);letter-spacing:0.1em;}
.date-val{font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--gold);}
.btn{
  padding:7px 14px;border-radius:6px;
  font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;
  cursor:pointer;transition:all 0.2s;border:none;text-transform:uppercase;
}
.btn-gold{background:var(--gold);color:#0a0a0c;}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
.btn-outline:hover{border-color:var(--border-gold);color:var(--gold);}
 
/* TIP CARD */
.tip-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  margin-bottom:12px;overflow:hidden;transition:border-color 0.2s;
  animation:fadeUp 0.4s ease both;
}
.tip-card:hover{border-color:var(--border-gold);}
.tip-card.banker{border-left:3px solid var(--gold);}
.tip-card.value{border-left:3px solid var(--green);}
.tip-card.punter{border-left:3px solid var(--purple);}
.tip-card.won{border-left:3px solid var(--green)!important;}
.tip-card.lost{border-left:3px solid var(--red)!important;opacity:0.75;}
 
.tip-header{padding:14px 16px;cursor:pointer;}
.tip-meta{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap;}
.badge{font-family:'DM Mono',monospace;font-size:0.56rem;font-weight:500;padding:2px 8px;border-radius:3px;letter-spacing:0.08em;text-transform:uppercase;}
.badge-banker{background:var(--gold-dim);color:var(--gold);}
.badge-value{background:var(--green-dim);color:var(--green);}
.badge-punter{background:var(--purple-dim);color:var(--purple);}
.badge-live{background:rgba(46,204,113,0.15);color:var(--green);}
.badge-pending{background:rgba(201,168,76,0.1);color:var(--gold);}
.badge-won{background:var(--green-dim);color:var(--green);}
.badge-lost{background:var(--red-dim);color:var(--red);}
.league-tag{font-family:'DM Mono',monospace;font-size:0.56rem;color:var(--text-dim);}
.time-tag{font-family:'DM Mono',monospace;font-size:0.56rem;color:var(--text-dim);margin-left:auto;}
 
.tip-match{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:6px;line-height:1.3;}
.tip-sel{display:inline-block;background:var(--gold-dim);border:1px solid var(--border-gold);color:var(--gold);font-size:0.78rem;font-weight:600;padding:3px 11px;border-radius:4px;margin-bottom:3px;}
.tip-mkt{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text-dim);margin-left:7px;}
 
/* ODDS ROW */
.odds-row{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap;}
.odds-main{text-align:center;min-width:52px;}
.odds-dec{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;line-height:1;}
.odds-frac{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);margin-top:1px;}
.odds-src{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.08em;margin-top:2px;}
.divider{width:1px;height:44px;background:var(--border);flex-shrink:0;}
 
.prob-block{flex:1;min-width:160px;}
.prob-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.prob-label{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);}
.prob-pct{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--gold);}
.prob-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.prob-fill{height:100%;border-radius:2px;transition:width 1s ease;}
 
/* MULTI ODDS */
.odds-compare{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;
  padding-top:8px;border-top:1px solid var(--border);
}
.odds-book{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:5px;padding:5px 8px;text-align:center;min-width:60px;
  transition:border-color 0.2s;
}
.odds-book.best{border-color:var(--border-gold);background:var(--gold-dim);}
.odds-book-name{font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--text-dim);letter-spacing:0.06em;}
.odds-book-val{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;}
 
/* VALUE BADGE */
.val-badge{
  font-family:'DM Mono',monospace;font-size:0.56rem;font-weight:600;
  padding:2px 8px;border-radius:3px;
}
.val-yes{background:var(--green-dim);color:var(--green);}
.val-no{background:rgba(255,255,255,0.04);color:var(--text-dim);}
 
/* RETURN */
.return-pill{
  font-family:'DM Mono',monospace;font-size:0.6rem;
  color:var(--green);background:var(--green-dim);
  padding:3px 9px;border-radius:3px;
}
 
/* RESULT BTNS */
.result-btns{display:flex;gap:6px;margin-top:10px;}
.btn-won{flex:1;padding:7px;background:var(--green-dim);border:1px solid rgba(46,204,113,0.25);border-radius:5px;color:var(--green);font-family:'DM Mono',monospace;font-size:0.58rem;cursor:pointer;letter-spacing:0.06em;transition:all 0.2s;}
.btn-won:hover{background:rgba(46,204,113,0.2);}
.btn-lost{flex:1;padding:7px;background:var(--red-dim);border:1px solid rgba(231,76,60,0.15);border-radius:5px;color:var(--red);font-family:'DM Mono',monospace;font-size:0.58rem;cursor:pointer;letter-spacing:0.06em;transition:all 0.2s;}
.btn-lost:hover{background:rgba(231,76,60,0.15);}
 
/* EXPAND */
.expand-btn{
  width:100%;padding:8px;background:transparent;border:none;
  border-top:1px solid var(--border);color:var(--text-dim);
  font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;
  cursor:pointer;transition:all 0.2s;
}
.expand-btn:hover{background:rgba(255,255,255,0.02);color:var(--gold);}
 
/* REASON PANEL */
.reason-panel{
  padding:14px 16px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.15);
}
.reason-text{font-size:0.8rem;color:var(--text-mid);line-height:1.7;margin-bottom:12px;}
 
/* TABS */
.tabs{display:flex;gap:0;background:rgba(0,0,0,0.3);border-radius:6px;padding:3px;margin-bottom:12px;}
.tab-btn{
  flex:1;padding:6px;border:none;background:transparent;
  color:var(--text-dim);font-family:'DM Mono',monospace;font-size:0.56rem;
  letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;
  border-radius:4px;transition:all 0.2s;
}
.tab-btn.active{background:var(--gold-dim);color:var(--gold);}
 
/* MARKETS GRID */
.mkt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
@media(max-width:400px){.mkt-grid{grid-template-columns:repeat(2,1fr);}}
.mkt-cell{
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:6px;padding:7px 5px;text-align:center;transition:border-color 0.2s;
}
.mkt-cell.hi{border-color:var(--border-gold);background:var(--gold-dim);}
.mkt-pct{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;line-height:1;margin-bottom:2px;}
.mkt-label{font-family:'DM Mono',monospace;font-size:0.53rem;color:var(--text-dim);line-height:1.3;}
.mkt-odds{font-family:'DM Mono',monospace;font-size:0.56rem;color:var(--text-dim);margin-top:2px;}
 
/* STATS COMPARISON */
.stats-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:3px 8px;}
.sc-home{color:var(--text-mid);font-size:0.73rem;text-align:right;padding:4px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;}
.sc-label{color:var(--text-dim);font-size:0.55rem;text-align:center;padding:4px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;white-space:nowrap;}
.sc-away{color:var(--text-mid);font-size:0.73rem;text-align:left;padding:4px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;}
.sc-head{color:var(--gold);font-size:0.6rem;font-family:'DM Mono',monospace;padding-bottom:5px;border-bottom:1px solid var(--border-gold);}
 
/* CORRECT SCORES */
.score-list{display:flex;flex-direction:column;gap:4px;}
.score-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.02);border-radius:5px;padding:7px 11px;
}
.score-val{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;}
.score-bar-wrap{flex:1;height:2px;background:rgba(255,255,255,0.05);border-radius:2px;margin:0 10px;}
.score-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;}
.score-odds{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-dim);}
 
/* ACCA CARD */
.acca-card{
  background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(201,168,76,0.02));
  border:1px solid var(--border-gold);border-radius:12px;padding:16px;
  margin-bottom:14px;animation:fadeUp 0.5s ease 0.1s both;
}
.acca-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;margin-bottom:3px;}
.acca-sub{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text-dim);margin-bottom:12px;}
.acca-leg{
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,0.2);border-radius:5px;padding:7px 11px;margin-bottom:4px;
}
.acca-match{font-size:0.7rem;color:var(--text-dim);}
.acca-sel{font-size:0.78rem;font-weight:600;}
.acca-odd{font-family:'Playfair Display',serif;font-size:0.88rem;font-weight:700;color:var(--gold);}
.acca-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:11px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px;
  margin-top:8px;
}
.acca-total{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--gold);line-height:1;}
.acca-return{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--green);background:var(--green-dim);padding:4px 10px;border-radius:3px;}
 
/* RESULTS PAGE */
.results-summary{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;
}
@media(max-width:480px){.results-summary{grid-template-columns:repeat(2,1fr);}}
.rs-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px;text-align:center;
}
.rs-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;line-height:1;margin-bottom:4px;}
.rs-label{font-family:'DM Mono',monospace;font-size:0.54rem;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;}
 
/* P&L CHART */
.pnl-chart{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin-bottom:20px;
}
.pnl-chart-title{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dim);letter-spacing:0.12em;margin-bottom:14px;text-transform:uppercase;}
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:80px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.chart-bar{width:100%;border-radius:2px 2px 0 0;transition:height 0.5s ease;min-height:2px;}
.chart-bar.pos{background:var(--green);}
.chart-bar.neg{background:var(--red);}
.chart-label{font-family:'DM Mono',monospace;font-size:0.45rem;color:var(--text-dim);text-align:center;}
 
/* HISTORY ROWS */
.history-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;overflow:hidden;
}
.history-header{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  cursor:pointer;flex-wrap:wrap;
}
.history-date{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);}
.history-match{font-size:0.82rem;font-weight:600;flex:1;}
.history-sel{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--gold);}
.history-result{font-family:'DM Mono',monospace;font-size:0.62rem;font-weight:600;padding:2px 8px;border-radius:3px;}
.history-pnl{font-family:'DM Mono',monospace;font-size:0.7rem;font-weight:700;min-width:50px;text-align:right;}
 
/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty-ico{font-size:2.2rem;margin-bottom:10px;opacity:0.4;}
.empty-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--text-mid);margin-bottom:6px;}
.empty-sub{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dim);}
 
/* LOADING */
.loading{text-align:center;padding:50px 20px;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
.loading-text{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--text-dim);letter-spacing:0.1em;animation:pulse 1.5s infinite;}
.loading-sub{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text-dim);margin-top:5px;opacity:0.5;}
 
/* DEBUG */
.debug-box{
  background:#120a0a;border:1px solid #3a1a1a;border-left:3px solid var(--red);
  padding:12px 16px;font-family:'DM Mono',monospace;font-size:0.62rem;
  color:#cc5555;line-height:1.7;margin-bottom:12px;
}
.debug-title{color:var(--red);font-weight:600;margin-bottom:6px;letter-spacing:0.1em;}
 
/* DISCLAIMER */
.disclaimer{
  text-align:center;padding:16px;
  font-family:'DM Mono',monospace;font-size:0.52rem;color:#2a2a2e;
  border-top:1px solid var(--border);line-height:1.8;
}
 
/* MOBILE */
@media(max-width:480px){
  nav{padding:0 12px;}
  .nav-tabs{gap:0;margin:0 8px;}
  .nav-tab{padding:5px 8px;font-size:0.72rem;}
  .page{padding:14px 10px 50px;}
  .tip-match{font-size:0.9rem;}
  .odds-dec{font-size:1.3rem;}
  .acca-total{font-size:1.5rem;}
}
</style>
</head>
<body>
 
<!-- NAV -->
<nav>
  <div class="nav-logo">
    <div class="nav-logo-mark">E</div>
    <div>
      <div class="nav-logo-text">The Edge</div>
      <div class="nav-logo-sub">Betting Intelligence</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('today')">Today</button>
    <button class="nav-tab" onclick="showPage('results')">Results</button>
  </div>
  <div class="nav-status">
    <div class="status-dot dot-loading" id="statusDot"></div>
    <span id="statusText" style="color:var(--gold)">Loading</span>
  </div>
</nav>
 
<!-- DATE ROW -->
<div class="date-row">
  <div>
    <div class="date-label">Today's Card</div>
    <div class="date-val" id="dateDisplay"></div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;">
    <span id="fixtureCount" style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text-dim);"></span>
    <button class="btn btn-gold" onclick="loadCard()">↻ Refresh</button>
    <button class="btn btn-outline" onclick="testApi()">Test API</button>
  </div>
</div>
 
<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat"><div class="stat-val white" id="sPnl">+£0.00</div><div class="stat-label">P&L (£20/bet)</div></div>
  <div class="stat"><div class="stat-val gold" id="sRecord">0W / 0L</div><div class="stat-label">Record</div></div>
  <div class="stat"><div class="stat-val white" id="sSels">0</div><div class="stat-label">Selections</div></div>
  <div class="stat"><div class="stat-val gold" id="sAvg">—</div><div class="stat-label">Avg Odds</div></div>
</div>
 
<!-- TODAY PAGE -->
<div class="page active" id="page-today">
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Connecting to live data...</div>
    <div class="loading-sub" id="loadingSub"></div>
  </div>
  <div id="debugBox" style="display:none;" class="debug-box">
    <div class="debug-title">⚠ API INFO</div>
    <pre id="debugText" style="white-space:pre-wrap;word-break:break-all;font-size:0.58rem;"></pre>
  </div>
  <div id="picksEl" style="display:none;"></div>
</div>
 
<!-- RESULTS PAGE -->
<div class="page" id="page-results">
  <div id="resultsEl"></div>
</div>
 
<script>
// ═══════════════════════════════════════════════════════════

function getStats(name, liveStats) {
  if (liveStats) return liveStats;
  if (FALLBACK[name]) return FALLBACK[name];
  const k = Object.keys(FALLBACK).find(k =>
    k.toLowerCase().includes(name.toLowerCase()) ||
    name.toLowerCase().includes(k.toLowerCase())
  );
  return k ? FALLBACK[k] : {
    position:10,played:30,won:12,drawn:7,lost:11,
    gf:40,ga:40,points:43,form:["W","D","L","W","D"],
    homeAdv:65,awayStr:58
  };
}
 
// ═══════════════════════════════════════════════════════════
// ANALYSIS ENGINE — uses live stats when available
// ═══════════════════════════════════════════════════════════
function fp(f){return(f||[]).reduce((a,r)=>a+(r==="W"?3:r==="D"?1:0),0);}
function cl(v,mn=5,mx=95){return Math.max(mn,Math.min(mx,Math.round(v)));}
function fact(n){return n<=1?1:n*fact(n-1);}
function p2d(p){return parseFloat((100/p).toFixed(2));}
function d2f(d){
  const f=d-1;
  const L=[[1,10],[1,8],[1,7],[1,6],[1,5],[2,9],[1,4],[2,7],[3,10],[1,3],[4,11],[2,5],[4,9],[1,2],[8,15],[4,7],[8,13],[4,6],[8,11],[4,5],[5,6],[10,11],[1,1],[11,10],[6,5],[5,4],[11,8],[7,5],[3,2],[13,8],[7,4],[2,1],[9,4],[5,2],[11,4],[3,1],[4,1],[5,1],[6,1],[8,1],[10,1]];
  let b=L[0],bd=99;
  for(const[n,dd]of L){const diff=Math.abs(n/dd-f);if(diff<bd){bd=diff;b=[n,dd];}}
  return `${b[0]}/${b[1]}`;
}
function impliedP(dec){return dec>1?Math.round(100/dec):0;}
function colForP(p){return p>=68?"var(--green)":p>=60?"var(--gold)":p>=52?"var(--purple)":"var(--text-dim)";}
 
function analyseMatch(hName, aName, hLive, aLive) {
  const H = getStats(hName, hLive);
  const A = getStats(aName, aLive);
  // Check if we actually have stats for these teams
  const hKnown = !!(hLive || FALLBACK[hName] || Object.keys(FALLBACK).find(k =>
    k.toLowerCase().includes(hName.toLowerCase()) || hName.toLowerCase().includes(k.toLowerCase())
  ));
  const aKnown = !!(aLive || FALLBACK[aName] || Object.keys(FALLBACK).find(k =>
    k.toLowerCase().includes(aName.toLowerCase()) || aName.toLowerCase().includes(k.toLowerCase())
  ));
  const bothKnown = hKnown && aKnown;
 
  const hPlayed = H.played || 1;
  const aPlayed = A.played || 1;
  const hGPG = (H.gf || 0) / hPlayed;
  const aGPG = (A.gf || 0) / aPlayed;
  const hCPG = (H.ga || 0) / hPlayed;
  const aCPG = (A.ga || 0) / aPlayed;
 
  const hFP = fp(H.form), aFP = fp(A.form);
  const hStr = ((H.homeAdv||65) + hFP*3 + (H.won||H.w||10)/hPlayed*30) / 2.2;
  const aStr = ((A.awayStr||58) + aFP*3 + (A.won||A.w||10)/aPlayed*30) / 2.2;
 
  let hw = cl(50+(hStr-aStr)*0.35+8, 10, 88);
  let aw = cl(50+(aStr-hStr)*0.35-8, 8, 82);
  let d  = cl(100-hw-aw, 8, 38);
  const tot = hw+d+aw;
  hw = Math.round(hw/tot*100); aw = Math.round(aw/tot*100); d = 100-hw-aw;
 
  const eG = ((hGPG+aCPG+aGPG+hCPG)/2)*1.05;
  const eHT = eG*0.42;
 
  const ov15 = cl(eG>1.6?76+(eG-1.6)*14:50+eG*16);
  const ov25 = cl(eG>2.5?58+(eG-2.5)*16:30+eG*11);
  const ov35 = cl(eG>3.0?40+(eG-3.0)*16:15+eG*9);
  const un25 = cl(100-ov25);
  const htOv05 = cl(eHT>0.7?62+(eHT-0.7)*20:40+eHT*30);
  const bttsY = cl((hGPG>0.8&&aGPG>0.8)?55+(hGPG+aGPG)*5:35+(hGPG+aGPG)*8);
  const bttsN = cl(100-bttsY);
  const hCS = cl((hCPG<0.9?55:hCPG<1.2?42:28)+(aGPG<1.0?10:0));
  const aCS = cl((aCPG<0.9?50:aCPG<1.2?38:25)+(hGPG<1.0?10:0));
  const hWN = cl(hw*(hCS/100)*0.9);
  const dcHD = cl(hw+d);
  const eC = (hGPG>1.5?5.8:4.8)+(aGPG>1.5?5.2:4.4);
  const c85 = cl(eC>9.5?62+(eC-9.5)*9:38+eC*2.5);
  const c105 = cl(eC>11?50+(eC-11)*10:26+eC*2);
  const eCards = hGPG>1.5&&aGPG>1.5?3.8:hGPG>1.0&&aGPG>1.0?3.2:2.8;
  const cd35 = cl(eCards>3.8?58+(eCards-3.8)*13:28+eCards*8);
 
  // Correct scores
  const scores=[];
  for(let h=0;h<=4;h++)for(let a=0;a<=4;a++){
    const r=(hw/100*Math.pow(Math.max(hGPG,0.1),h)*Math.exp(-Math.max(hGPG,0.1))/fact(h))*
            (aw/100*Math.pow(Math.max(aGPG,0.1),a)*Math.exp(-Math.max(aGPG,0.1))/fact(a));
    if(r>0.005) scores.push({score:`${h}-${a}`,prob:cl(r*140,3,32)});
  }
  scores.sort((x,y)=>y.prob-x.prob);
 
  return {
    hw,d,aw,bttsY,bttsN,ov15,ov25,ov35,un25,htOv05,hCS,aCS,hWN,dcHD,c85,c105,cd35,
    eG:eG.toFixed(2),eC:eC.toFixed(1),eCards:eCards.toFixed(1),
    hGPG:hGPG.toFixed(2),aGPG:aGPG.toFixed(2),
    hCPG:hCPG.toFixed(2),aCPG:aCPG.toFixed(2),
    hForm:(H.form||[]).join("-"),aForm:(A.form||[]).join("-"),
    hRec:`${H.won||H.w||"?"}W-${H.drawn||H.d||"?"}D-${H.lost||H.l||"?"}L`,
    aRec:`${A.won||A.w||"?"}W-${A.drawn||A.d||"?"}D-${A.lost||A.l||"?"}L`,
    hPos:H.position||"?",aPos:A.position||"?",
    hPts:H.points||"?",aPts:A.points||"?",
    hasLiveStats:!!(hLive&&aLive),
    bothKnown,
    topScores:scores.slice(0,5),
  };
}
 
// ═══════════════════════════════════════════════════════════
// PICK SELECTOR — smarter selection with value detection
// ═══════════════════════════════════════════════════════════
function selectPick(hN, aN, stats, liveOdds, trusted) {
  const s = stats;
  const lo = liveOdds || {};
  const candidates = [];
 
  // STRICT CRITERIA — only high confidence picks
  // Must have known stats for both teams
  // Min probability: 63% for trusted leagues, 68% for unknown
  // Min odds: 1.50 (1/2) — no short-priced bets
  // Max odds: 4.00 — no long shots
  const MIN_PROB = trusted ? 63 : 68;
  const MIN_ODDS = 1.50;
  const MAX_ODDS = 4.00;
 
  // Reject if we don't know either team — no guessing
  
 
  function add(mkt, sel, prob, reason, bookKey) {
    if (prob < MIN_PROB) return; // Must be genuinely confident
    const modelDec = p2d(prob);
    if (modelDec < MIN_ODDS || modelDec > MAX_ODDS) return;
 
    const bookDec = lo[bookKey] && lo[bookKey] > 1.10 ? lo[bookKey] : null;
    const dispDec = bookDec || modelDec;
    const bookImplied = bookDec ? impliedP(bookDec) : null;
    const edge = bookImplied !== null ? prob - bookImplied : 0;
    const isValue = edge > 3;
 
    // Score: probability + odds sweetspot bonus + value bonus
    const oddBonus = (dispDec>=1.70&&dispDec<=3.50)?15:(dispDec>=1.50&&dispDec<1.70)?6:0;
    const edgeBonus = isValue ? Math.min(edge*1.5, 18) : 0;
    const score = prob + oddBonus + edgeBonus;
 
    candidates.push({
      mkt, sel, prob, dec:dispDec, modelDec, bookDec, bookImplied, edge, isValue, reason, score,
      tier: prob>=66?"banker":prob>=58?"value":"punter",
      frac: d2f(dispDec),
    });
  }
 
  // Form description
  const hFormDesc = `${s.hForm} (${s.hRec}, ${s.hPos}${s.hPos!=="?"?"th":""})`;
  const aFormDesc = `${s.aForm} (${s.aRec}, ${s.aPos}${s.aPos!=="?"?"th":""})`;
 
  // Match result
  if (s.hw>=57) add("Match Result",`${hN} Win`,s.hw,
    `${hN} in strong form — ${hFormDesc}. Scoring ${s.hGPG} goals/game, conceding ${s.hCPG}. ${aN} conceding ${s.aCPG}/game on the road. Home advantage clearly a factor in this fixture.`,"hw");
  if (s.aw>=55) add("Match Result",`${aN} Win`,s.aw,
    `${aN} dangerous away from home — ${aFormDesc}. Scoring ${s.aGPG}/game with ${aN} conceding ${s.hCPG} at home. Away form suggests they can take something from this.`,"aw");
  if (s.d>=28) add("Match Result","Draw",s.d,
    `Evenly matched — ${hN} ${hFormDesc} vs ${aN} ${aFormDesc}. Similar xG profiles and neither side dominant enough to strongly favour a winner.`,"draw");
 
  // Goals
  if (s.ov25>=58&&s.ov25<=84) add("Goals","Over 2.5 Goals",s.ov25,
    `Expected goals: ${s.eG}. ${hN} averaging ${s.hGPG} scored, ${s.hCPG} conceded per game. ${aN}: ${s.aGPG} scored, ${s.aCPG} conceded. Over 2.5 is the expected outcome in an open fixture like this.`,"ov25");
  if (s.un25>=58&&s.un25<=84) add("Goals","Under 2.5 Goals",s.un25,
    `Tight, defensive encounter expected — combined expected goals only ${s.eG}. Both defences have been solid. Under 2.5 has been the pattern in similar fixtures this season.`,"un25");
  if (s.ov35>=54&&s.ov35<=78) add("Goals","Over 3.5 Goals",s.ov35,
    `High-scoring clash on the cards — ${hN} scoring ${s.hGPG}/game and ${aN} scoring ${s.aGPG}/game. Neither defence particularly mean. Expected total: ${s.eG} goals.`,"ov35");
  if (s.ov15>=72&&s.ov15<=90) add("Goals","Over 1.5 Goals",s.ov15,
    `Near certainty — combined attacking output guarantees at least 2 goals in the vast majority of these fixtures. ${hN} score ${s.hGPG}/game, ${aN} score ${s.aGPG}/game.`,"ov15");
 
  // BTTS
  if (s.bttsY>=58&&s.bttsY<=84) add("Both Teams to Score","BTTS — Yes",s.bttsY,
    `Both sides have strong scoring records — ${hN}: ${s.hGPG}/game, ${aN}: ${s.aGPG}/game. Neither defence is a wall. BTTS is the likeliest scenario in this open encounter.`,"bttsY");
  if (s.bttsN>=60&&s.bttsN<=84) add("Both Teams to Score","BTTS — No",s.bttsN,
    `At least one side likely shut out — ${hN} conceding only ${s.hCPG}/game or ${aN} conceding ${s.aCPG}/game. One of these defences is strong enough to keep a clean sheet.`,"bttsN");
 
  // 1st Half
  if (s.htOv05>=68&&s.htOv05<=90) add("1st Half","HT Over 0.5 Goals",s.htOv05,
    `Both sides press high from the first whistle. At least one first-half goal is almost certain given the combined attacking intent. Backed by expected goals model: ${s.eG} total expected.`,null);
 
  // Clean sheet
  if (s.hCS>=56&&s.hCS<=78) add("Clean Sheet",`${hN} Clean Sheet`,s.hCS,
    `${hN} defensively excellent — conceding just ${s.hCPG}/game. ${aN} have struggled to score on the road this season. A shutout is the most likely defensive outcome.`,null);
 
  // Double chance
  if (s.dcHD>=68&&s.dcHD<=88) add("Double Chance",`${hN} or Draw`,s.dcHD,
    `${s.hw}% home + ${s.d}% draw = ${s.dcHD}% combined. ${hN} are difficult to beat at home. Double chance removes the away win risk at reasonable odds.`,"hw");
 
  // Corners
  if (s.c85>=62&&s.c85<=84) add("Corners","Over 8.5 Corners",s.c85,
    `Expected corner total: ${s.eC}. Both teams use wide play extensively and generate high corner counts. This line is regularly surpassed in similar fixtures.`,null);
 
  // Cards
  if (s.cd35>=60&&s.cd35<=82) add("Cards","Over 3.5 Cards",s.cd35,
    `Physical encounter expected — combined card average of ${s.eCards} per game. Competitive fixture with history of cards. Over 3.5 backed by both teams' disciplinary records.`,null);
 
  if (!candidates.length) return null;
  candidates.sort((a,b)=>b.score-a.score);
  return candidates[0];
}

// LOCAL STORAGE
// ═══════════════════════════════════════════════════════════
function getResults(){try{return JSON.parse(localStorage.getItem("edge_results")||"[]");}catch(e){return[];}}
function saveResult(id,won,pick){
  const r=getResults();
  const i=r.findIndex(x=>x.id===id);
  if(i>=0)r[i]={...r[i],won};
  else r.push({id,won,date:todayStr(),match:pick.match,sel:pick.sel,mkt:pick.mkt,dec:pick.dec,prob:pick.prob,league:pick.league,kickoff:pick.kickoff});
  try{localStorage.setItem("edge_results",JSON.stringify(r));}catch(e){}
}
function clearResult(id){
  const r=getResults().filter(x=>x.id!==id);
  try{localStorage.setItem("edge_results",JSON.stringify(r));}catch(e){}
}

// STATE
// ═══════════════════════════════════════════════════════════
let picks=[], openCards={}, activeTabs={}, currentPage="today";
 
// ═══════════════════════════════════════════════════════════
// MAIN LOAD
// ═══════════════════════════════════════════════════════════
async function loadCard(){
  document.getElementById("dateDisplay").textContent=todayDisplay();
  document.getElementById("loadingEl").style.display="block";
  document.getElementById("picksEl").style.display="none";
  document.getElementById("debugBox").style.display="none";
  setStatus("loading","Loading...");
  picks=[];
 
  let fixtures=[];
  let meta={};
  let debugLines=[];
 
  try{
    setLoadingText("Fetching live fixtures + odds...");
    const res=await fetch(API_URL);
    debugLines.push(`Status: ${res.status}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    fixtures=data.matches||[];
    meta=data.meta||{};
    debugLines.push(`Fixtures: ${fixtures.length}`);
    debugLines.push(`With odds: ${meta.withOdds||0}`);
    debugLines.push(`With stats: ${meta.withStats||0}`);
    setStatus("live",`${fixtures.length} fixtures`);
    document.getElementById("fixtureCount").textContent=`${fixtures.length} fixtures · ${meta.withOdds||0} with live odds`;
  }catch(e){
    debugLines.push(`ERROR: ${e.message}`);
    setStatus("off","Fallback mode");
    // Use fallback fixtures
    fixtures=[
      {id:"f1",homeTeam:{name:"Arsenal"},awayTeam:{name:"Chelsea"},competition:{name:"Premier League",code:"PL"},utcDate:new Date().toISOString(),homeStats:null,awayStats:null,liveOdds:{}},
      {id:"f2",homeTeam:{name:"Real Madrid"},awayTeam:{name:"Barcelona"},competition:{name:"La Liga",code:"PD"},utcDate:new Date().toISOString(),homeStats:null,awayStats:null,liveOdds:{}},
      {id:"f3",homeTeam:{name:"Bayern Munich"},awayTeam:{name:"Borussia Dortmund"},competition:{name:"Bundesliga",code:"BL1"},utcDate:new Date().toISOString(),homeStats:null,awayStats:null,liveOdds:{}},
      {id:"f4",homeTeam:{name:"Inter Milan"},awayTeam:{name:"AC Milan"},competition:{name:"Serie A",code:"SA"},utcDate:new Date().toISOString(),homeStats:null,awayStats:null,liveOdds:{}},
      {id:"f5",homeTeam:{name:"PSG"},awayTeam:{name:"Lyon"},competition:{name:"Ligue 1",code:"FL1"},utcDate:new Date().toISOString(),homeStats:null,awayStats:null,liveOdds:{}},
    ];
    document.getElementById("debugBox").style.display="block";
    document.getElementById("debugText").textContent=debugLines.join("\n")+"\n\nUsing fallback fixtures.";
  }
 
  setLoadingText("Running analysis across all markets...");
  await sleep(300);
 
  // Analyse and score every fixture
  const all=[];
  for(const f of fixtures){
    try{
      const hN=f.homeTeam?.name||f.homeTeam?.shortName||"Home";
      const aN=f.awayTeam?.name||f.awayTeam?.shortName||"Away";
      const league=FD_COMPS[f.competition?.code]||f.competition?.name||"Football";
      const kickoff=f.utcDate?new Date(f.utcDate).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"}):"TBC";
      const stats=analyseMatch(hN,aN,f.homeStats,f.awayStats);
      const pick=selectPick(hN,aN,stats,f.liveOdds||{},f.trusted||false);
      if(pick){
        all.push({
          ...pick,
          id:`${todayStr()}_${hN}_${aN}`.replace(/\s+/g,"_"),
          match:`${hN} vs ${aN}`,
          home:hN,away:aN,league,kickoff,stats,
          liveOdds:f.liveOdds||{},
          hasLiveStats:stats.hasLiveStats,
        });
      }
    }catch(e){console.error("Pick error:",e);}
  }
 
  // Sort — trusted leagues first, then by score
  all.sort((a,b)=>{
    if(a.trusted!==b.trusted) return a.trusted?-1:1;
    return b.score-a.score;
  });
 
  // Strict diversity filter — quality over quantity
  const sel=[],usedF=new Set(),mktC={},lgC={};
  for(const c of all){
    if(sel.length>=5) break;
    if(usedF.has(c.match)) continue;
    if((mktC[c.mkt]||0)>=2) continue;
    if((lgC[c.league]||0)>=2) continue;
    if(c.dec<1.50) continue; // Strict minimum odds
    if(c.prob<63) continue;  // Strict minimum probability
    sel.push(c);
    usedF.add(c.match);
    mktC[c.mkt]=(mktC[c.mkt]||0)+1;
    lgC[c.league]=(lgC[c.league]||0)+1;
  }
 
  // If fewer than 3 high-confidence picks — show what we have
  // Do NOT force picks that don't meet the criteria
  // Better to have 1 great pick than 5 poor ones
  console.log(`Selected ${sel.length} picks from ${all.length} candidates`);
 
  picks=sel;
  document.getElementById("loadingEl").style.display="none";
  document.getElementById("picksEl").style.display="block";
  updateStatsBar();
  renderPicks();
}
 
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setStatus(type,text){
  const dot=document.getElementById("statusDot");
  const txt=document.getElementById("statusText");
  dot.className="status-dot "+(type==="live"?"dot-live":type==="loading"?"dot-loading":"dot-off");
  txt.textContent=text;
  txt.style.color=type==="live"?"var(--green)":type==="loading"?"var(--gold)":"var(--text-dim)";
}
function setLoadingText(t){
  const el=document.getElementById("loadingText");
  if(el) el.textContent=t;
}
 
// ═══════════════════════════════════════════════════════════
// STATS BAR
// ═══════════════════════════════════════════════════════════
function updateStatsBar(){
  const saved=getResults().filter(r=>r.date===todayStr());
  let pnl=0,wins=0,losses=0;
  for(const p of picks){
    const s=saved.find(r=>r.id===p.id);
    if(s){if(s.won){pnl+=(p.dec-1)*STAKE;wins++;}else{pnl-=STAKE;losses++;}}
  }
  const avgOdds=picks.length?(picks.reduce((a,p)=>a+p.dec,0)/picks.length).toFixed(2):"—";
  const pnlEl=document.getElementById("sPnl");
  pnlEl.textContent=(pnl>=0?"+":"")+`£${Math.abs(pnl).toFixed(2)}`;
  pnlEl.className="stat-val "+(pnl>0?"green":pnl<0?"red":"white");
  document.getElementById("sRecord").textContent=`${wins}W / ${losses}L`;
  document.getElementById("sSels").textContent=picks.length;
  document.getElementById("sAvg").textContent=avgOdds;
}
 
// ═══════════════════════════════════════════════════════════
// RENDER PICKS
// ═══════════════════════════════════════════════════════════
function renderPicks(){
  const el=document.getElementById("picksEl");

    return;
  }
 
  const saved=getResults().filter(r=>r.date===todayStr());
  let html="";
 
  // Banker acca
  const bankers=picks.filter(p=>p.tier==="banker");
  if(bankers.length>=2){
    const accaOdds=bankers.reduce((a,p)=>a*p.dec,1);
    html+=`<div class="acca-card">

      {l:"Win to Nil",pct:s.hWN},{l:"Corners 8.5+",pct:s.c85},{l:"Corners 10.5+",pct:s.c105},
      {l:"Cards 3.5+",pct:s.cd35},{l:`${p.home}/Draw`,pct:s.dcHD},
    ];
 
    // Bookmaker odds comparison
    const lo=p.liveOdds||{};
    const oddsCompare=[];
    if(lo.hw&&p.home.toLowerCase().includes(p.home.split(" ")[0].toLowerCase())) oddsCompare.push({n:"Home Win",v:lo.hw});
    if(lo.aw) oddsCompare.push({n:"Away Win",v:lo.aw});
    if(lo.draw) oddsCompare.push({n:"Draw",v:lo.draw});
    if(lo.ov25) oddsCompare.push({n:"Over 2.5",v:lo.ov25});
    if(lo.un25) oddsCompare.push({n:"Under 2.5",v:lo.un25});

    if(lo.bttsN) oddsCompare.push({n:"BTTS No",v:lo.bttsN});
 
    html+=`<div class="tip-card ${p.tier} ${result}" style="animation-delay:${delay}s;">
      <div class="tip-header" onclick="toggleCard('${p.id}')">
        <div class="tip-meta">

          <button class="btn-lost" onclick="markResult(event,'${p.id}',false,${i})">✗ MARK LOST</button>
        </div>`:`<div style="margin-top:9px;font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);">
          ${result==="won"?`✓ Won · Profit <span style="color:var(--green)">+£${profAmt}</span>`:
            `✗ Lost · -£${STAKE}`}
          <button onclick="clearRes(event,'${p.id}')" style="background:none;border:none;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:0.56rem;cursor:pointer;margin-left:8px;text-decoration:underline;">clear</button>
        </div>`}
      </div>
      <button class="expand-btn" onclick="toggleCard('${p.id}')">${open?"▲ HIDE ANALYSIS":"▼ FULL ANALYSIS + ALL MARKETS"}</button>
      ${open?`<div class="reason-panel">
        <div class="tabs">
          ${["analysis","markets","scores"].map(t=>`<button class="tab-btn ${tab===t?"active":""}" onclick="setTab(event,'${p.id}','${t}')">${t}</button>`).join("")}

        ${tab==="analysis"?`
          <p class="reason-text">${p.reason}</p>

          <div class="stats-compare">

            ${[["Record",s.hRec,s.aRec],["Form",s.hForm,s.aForm],["Position",s.hPos,s.aPos],["Points",s.hPts,s.aPts],["Goals/G",s.hGPG,s.aGPG],["Conceded/G",s.hCPG,s.aCPG],["Exp Goals",s.eG,"—"],["Exp Corners",s.eC,"—"]].map(([l,h,a])=>`<div class="sc-home">${h}</div><div class="sc-label">${l}</div><div class="sc-away">${a}</div>`).join("")}

// ═══════════════════════════════════════════════════════════
// RESULTS PAGE
// ═══════════════════════════════════════════════════════════
function renderResults(){
  const el=document.getElementById("resultsEl");
  const all=getResults().sort((a,b)=>b.date.localeCompare(a.date));
  if(!all.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📊</div><div class="empty-title">No results yet</div><div class="empty-sub">Mark picks as won or lost on the Today tab.<br>Your record will build up here day by day.</div></div>`;
    return;
  }
 
  const totalW=all.filter(r=>r.won).length;
  const totalL=all.filter(r=>r.won===false).length;
  const totalBets=totalW+totalL;
  const strike=totalBets?Math.round(totalW/totalBets*100):0;
  let pnl=0;
  all.forEach(r=>{if(r.won===true)pnl+=(r.dec-1)*STAKE;else if(r.won===false)pnl-=STAKE;});
  const avgOdds=totalBets?(all.filter(r=>r.won!==undefined).reduce((a,r)=>a+r.dec,0)/totalBets).toFixed(2):"—";
 
  // Last 14 days for chart
  const days=[];
  for(let i=13;i>=0;i--){
    const d=new Date(Date.now()-i*86400000).toLocaleDateString("en-CA",{timeZone:"Europe/London"});
    const dayResults=all.filter(r=>r.date===d&&r.won!==undefined);
    let dayPnl=0;
    dayResults.forEach(r=>{if(r.won)dayPnl+=(r.dec-1)*STAKE;else dayPnl-=STAKE;});
    days.push({d:d.slice(5),pnl:dayPnl,count:dayResults.length});
  }
  const maxAbs=Math.max(...days.map(d=>Math.abs(d.pnl)),1);
 
  let html=``;
 
  // Summary cards
  html+=`<div class="results-summary">
    <div class="rs-card"><div class="rs-val ${pnl>=0?"green":"red"}">${pnl>=0?"+":"-"}£${Math.abs(pnl).toFixed(2)}</div><div class="rs-label">Total P&L</div></div>
    <div class="rs-card"><div class="rs-val gold">${strike}%</div><div class="rs-label">Strike Rate</div></div>
    <div class="rs-card"><div class="rs-val white">${totalW}W / ${totalL}L</div><div class="rs-label">Record</div></div>
    <div class="rs-card"><div class="rs-val gold">${avgOdds}</div><div class="rs-label">Avg Odds</div></div>
    <div class="rs-card"><div class="rs-val white">${totalBets}</div><div class="rs-label">Total Bets</div></div>
    <div class="rs-card"><div class="rs-val gold">£${STAKE}</div><div class="rs-label">Stake/Bet</div></div>
  </div>`;
 
  // P&L chart
  html+=`<div class="pnl-chart">
    <div class="pnl-chart-title">P&L — Last 14 Days (£${STAKE}/bet)</div>
    <div class="chart-bars">
      ${days.map(d=>{
        const h=d.pnl===0?2:Math.max(4,Math.round(Math.abs(d.pnl)/maxAbs*76));
        return `<div class="chart-bar-wrap">
          <div class="chart-bar ${d.pnl>=0?"pos":"neg"}" style="height:${h}px;" title="${d.d}: ${d.pnl>=0?"+":""}£${d.pnl.toFixed(0)}"></div>
          <div class="chart-label">${d.d}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
 
  // History
  html+=`<div class="sh"><div class="sh-line"></div><div class="sh-text">Pick History</div><div class="sh-line"></div></div>`;
 
  // Group by date
  const dates=[...new Set(all.map(r=>r.date))];
  dates.forEach(date=>{
    const dayPicks=all.filter(r=>r.date===date);
    let dayPnl=0;
    dayPicks.forEach(r=>{if(r.won===true)dayPnl+=(r.dec-1)*STAKE;else if(r.won===false)dayPnl-=STAKE;});
    const dateLabel=new Date(date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
 
    html+=`<div style="margin-bottom:4px;display:flex;align-items:center;gap:8px;padding:6px 0;">
      <div style="font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:700;color:var(--text-mid);">${dateLabel}</div>
      <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:${dayPnl>=0?"var(--green)":"var(--red)"};">${dayPnl>=0?"+":"-"}£${Math.abs(dayPnl).toFixed(2)}</div>
    </div>`;
 
    dayPicks.forEach(r=>{
      const isPending=r.won===undefined||r.won===null;
      html+=`<div class="history-card" style="margin-bottom:6px;">
        <div class="history-header">
          <div style="flex:1;">
            <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text-dim);margin-bottom:3px;">${r.league||""} · ${r.kickoff||""}</div>
            <div class="history-match">${r.match||""}</div>
            <div class="history-sel">${r.sel||""} <span style="color:var(--text-dim);font-size:0.55rem;">${r.mkt||""}</span></div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:'Playfair Display',serif;font-size:1.0rem;font-weight:700;color:var(--text);margin-bottom:2px;">${(r.dec||0).toFixed(2)}</div>
            <div class="history-result ${isPending?"badge-pending":r.won?"badge-won":"badge-lost"} badge">${isPending?"Pending":r.won?"Won":"Lost"}</div>
            <div class="history-pnl" style="color:${r.won?"var(--green)":r.won===false?"var(--red)":"var(--text-dim)"};">${r.won===true?`+£${((r.dec-1)*STAKE).toFixed(2)}`:r.won===false?`-£${STAKE}`:"—"}</div>
          </div>
        </div>
      </div>`;
    });
  });
 
  html+=`<div class="disclaimer">FOR ENTERTAINMENT & RESEARCH PURPOSES ONLY · GAMBLING INVOLVES RISK · 18+ · BEGAMBLEAWARE.ORG</div>`;
  el.innerHTML=html;
}
 
// ═══════════════════════════════════════════════════════════
// TEST API
// ═══════════════════════════════════════════════════════════
async function testApi(){
  const box=document.getElementById("debugBox");
  const txt=document.getElementById("debugText");
  box.style.display="block";
  txt.textContent="Testing API...\n";
  try{
    const res=await fetch(API_URL);
    txt.textContent+=`Status: ${res.status}\n`;
    const data=await res.json();
    const m=data.matches||[];
    txt.textContent+=`Fixtures: ${m.length}\n`;
    txt.textContent+=`Meta: ${JSON.stringify(data.meta||{})}\n\n`;
    if(m.length>0){
      txt.textContent+=`Today's fixtures:\n`;
      m.slice(0,10).forEach(f=>{
        const h=f.homeTeam?.name||"?";
        const a=f.awayTeam?.name||"?";
        const t=f.utcDate?new Date(f.utcDate).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"}):"?";
        const hasOdds=Object.keys(f.liveOdds||{}).length>0;
        const hasStats=f.hasStats;
        txt.textContent+=`  ${h} vs ${a} @ ${t} [${f.competition?.name}] odds:${hasOdds?"✓":"✗"} stats:${hasStats?"✓":"✗"}\n`;
      });
      if(m.length>10) txt.textContent+=`  ...and ${m.length-10} more\n`;
      txt.textContent+=`\n✓ API working. Hit Refresh to load picks.`;
    } else {
      txt.textContent+=`No fixtures found for today in covered competitions.\nThis is normal on days with no top-league fixtures.`;
    }
  }catch(e){
    txt.textContent+=`ERROR: ${e.message}\nMake sure Netlify function is deployed.`;
  }
  box.scrollIntoView({behavior:"smooth"});
}
 
// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════
function toggleCard(id){
  openCards[id]=openCards[id]===undefined?false:!openCards[id];
  // If first click (undefined→false), we want to CLOSE (since first pick starts open)
  // For subsequent cards (undefined), open on first click
  if(openCards[id]===false && Object.keys(openCards).filter(k=>k===id).length===1){
    openCards[id]=false;
  }
  openCards[id]=!openCards[id];
  renderPicks();
}
function setTab(e,id,tab){
  e.stopPropagation();
  activeTabs[id]=tab;
  openCards[id]=true;
  renderPicks();
}
function markResult(e,id,won,idx){
  e.stopPropagation();
  saveResult(id,won,picks[idx]);
  updateStatsBar();
  renderPicks();
  if(currentPage==="results") renderResults();
}
function clearRes(e,id){
  e.stopPropagation();
  clearResult(id);
  updateStatsBar();
  renderPicks();
  if(currentPage==="results") renderResults();
}
function showPage(page){
  currentPage=page;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(`page-${page}`).classList.add("active");
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  if(page==="results") renderResults();
}

document.getElementById("dateDisplay").textContent=todayDisplay();
 
// Fix toggle - simpler version
function toggleCard(id){
  if(openCards[id]===undefined){
    // First toggle - close it (first pick starts open)
    openCards[id]=false;
  } else {
    openCards[id]=!openCards[id];
  }
  renderPicks();
}
